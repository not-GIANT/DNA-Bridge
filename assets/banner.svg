<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" width="900" height="220">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1923;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter for nodes -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for text -->
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="bannerClip">
      <rect width="900" height="220" rx="12"/>
    </clipPath>

    <!-- Pulse gradient for data packets -->
    <radialGradient id="packetGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- Background -->
    <rect width="900" height="220" fill="url(#bgGrad)"/>
    <rect width="900" height="220" fill="url(#grid)"/>

    <!-- Border glow -->
    <rect width="900" height="220" rx="12" fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.25"/>

    <!-- ═══ LEFT COMPUTER ═══ -->
    <!-- Monitor body -->
    <rect x="60" y="55" width="120" height="85" rx="6" fill="#1e2d3d" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.7"/>
    <!-- Screen -->
    <rect x="67" y="62" width="106" height="71" rx="3" fill="#0d1f2d"/>
    <!-- Screen content lines -->
    <rect x="75" y="70" width="60" height="4" rx="2" fill="#38bdf8" opacity="0.6"/>
    <rect x="75" y="80" width="45" height="3" rx="2" fill="#64748b" opacity="0.5"/>
    <rect x="75" y="89" width="52" height="3" rx="2" fill="#64748b" opacity="0.5"/>
    <rect x="75" y="98" width="38" height="3" rx="2" fill="#64748b" opacity="0.4"/>
    <!-- Clipboard icon on screen -->
    <rect x="143" y="72" width="22" height="26" rx="3" fill="#0ea5e9" opacity="0.8"/>
    <rect x="148" y="68" width="12" height="6" rx="2" fill="#0ea5e9"/>
    <rect x="147" y="78" width="14" height="2" rx="1" fill="white" opacity="0.9"/>
    <rect x="147" y="83" width="14" height="2" rx="1" fill="white" opacity="0.9"/>
    <rect x="147" y="88" width="10" height="2" rx="1" fill="white" opacity="0.7"/>
    <!-- Monitor stand -->
    <rect x="113" y="140" width="6" height="14" rx="2" fill="#1e2d3d"/>
    <rect x="100" y="154" width="32" height="5" rx="2" fill="#1e2d3d" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.4"/>
    <!-- DEVICE A label -->
    <text x="120" y="178" font-family="'Courier New', monospace" font-size="10" fill="#38bdf8" opacity="0.7" text-anchor="middle">DEVICE A</text>

    <!-- Status indicator (green dot, pulsing) -->
    <circle cx="120" cy="195" r="4" fill="#22c55e" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="195" r="7" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="4;10;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- ═══ RIGHT COMPUTER ═══ -->
    <rect x="720" y="55" width="120" height="85" rx="6" fill="#1e2d3d" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.7"/>
    <rect x="727" y="62" width="106" height="71" rx="3" fill="#0d1f2d"/>
    <rect x="735" y="70" width="60" height="4" rx="2" fill="#38bdf8" opacity="0.6"/>
    <rect x="735" y="80" width="45" height="3" rx="2" fill="#64748b" opacity="0.5"/>
    <rect x="735" y="89" width="52" height="3" rx="2" fill="#64748b" opacity="0.5"/>
    <rect x="735" y="98" width="38" height="3" rx="2" fill="#64748b" opacity="0.4"/>
    <rect x="803" y="72" width="22" height="26" rx="3" fill="#0ea5e9" opacity="0.8"/>
    <rect x="808" y="68" width="12" height="6" rx="2" fill="#0ea5e9"/>
    <rect x="807" y="78" width="14" height="2" rx="1" fill="white" opacity="0.9"/>
    <rect x="807" y="83" width="14" height="2" rx="1" fill="white" opacity="0.9"/>
    <rect x="807" y="88" width="10" height="2" rx="1" fill="white" opacity="0.7"/>
    <rect x="773" y="140" width="6" height="14" rx="2" fill="#1e2d3d"/>
    <rect x="760" y="154" width="32" height="5" rx="2" fill="#1e2d3d" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="780" y="178" font-family="'Courier New', monospace" font-size="10" fill="#38bdf8" opacity="0.7" text-anchor="middle">DEVICE B</text>

    <circle cx="780" cy="195" r="4" fill="#22c55e" opacity="0.9">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="195" r="7" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="4;10;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- ═══ CONNECTION LINE ═══ -->
    <!-- Base line -->
    <line x1="240" y1="97" x2="660" y2="97" stroke="#1e3a4a" stroke-width="2"/>

    <!-- Animated dashes traveling right -->
    <line x1="240" y1="97" x2="660" y2="97" stroke="#38bdf8" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="20 15">
      <animate attributeName="stroke-dashoffset" from="0" to="-70" dur="1.2s" repeatCount="indefinite"/>
    </line>

    <!-- ═══ DATA PACKETS traveling right ═══ -->
    <circle r="5" fill="#38bdf8" filter="url(#nodeGlow)">
      <animateMotion path="M 240,97 L 660,97" dur="2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#38bdf8" filter="url(#nodeGlow)">
      <animateMotion path="M 240,97 L 660,97" dur="2s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#a78bfa" filter="url(#nodeGlow)">
      <animateMotion path="M 240,97 L 660,97" dur="2s" begin="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="2s" begin="1.4s" repeatCount="indefinite"/>
    </circle>

    <!-- ═══ RELAY SERVER (center) ═══ -->
    <rect x="385" y="70" width="130" height="55" rx="8" fill="#0f2133" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Server rack lines -->
    <rect x="395" y="78" width="110" height="8" rx="3" fill="#1e3a4a"/>
    <rect x="397" y="80" width="4" height="4" rx="1" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="395" y="90" width="110" height="8" rx="3" fill="#1e3a4a"/>
    <rect x="397" y="92" width="4" height="4" rx="1" fill="#0ea5e9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="395" y="102" width="110" height="8" rx="3" fill="#1e3a4a"/>
    <rect x="397" y="104" width="4" height="4" rx="1" fill="#a78bfa">
      <animate attributeName="opacity" values="1;0.3;1" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <!-- Lock icon inside server -->
    <text x="450" y="88" font-family="Arial" font-size="11" fill="#38bdf8" text-anchor="middle" opacity="0.9">🔒 RELAY</text>
    <text x="450" y="120" font-family="'Courier New', monospace" font-size="8" fill="#64748b" text-anchor="middle">AES-128-CBC</text>

    <!-- ═══ TITLE ═══ -->
    <text x="450" y="157" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700"
          fill="#f8fafc" text-anchor="middle" filter="url(#textGlow)" letter-spacing="2">
      DNA Bridge
    </text>

    <!-- Subtitle -->
    <text x="450" y="176" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" letter-spacing="1">
      Instant  Clipboard  Sync  ·  E2E  Encrypted  ·  Cross-Network
    </text>

    <!-- ═══ TOP SHIELD BADGE ═══ -->
    <g transform="translate(830, 15)">
      <rect width="55" height="22" rx="11" fill="#0ea5e9" opacity="0.15"/>
      <rect width="55" height="22" rx="11" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
      <text x="28" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle" font-weight="600">v3.2.0</text>
    </g>

    <!-- ═══ TOP LEFT BADGE ═══ -->
    <g transform="translate(15, 15)">
      <rect width="65" height="22" rx="11" fill="#22c55e" opacity="0.15"/>
      <rect width="65" height="22" rx="11" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.5"/>
      <text x="33" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#22c55e" text-anchor="middle" font-weight="600">● LIVE SYNC</text>
    </g>

    <!-- Corner accent lines -->
    <line x1="0" y1="0" x2="30" y2="0" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="30" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
    <line x1="900" y1="0" x2="870" y2="0" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
    <line x1="900" y1="0" x2="900" y2="30" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="220" x2="30" y2="220" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="220" x2="0" y2="190" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
    <line x1="900" y1="220" x2="870" y2="220" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
    <line x1="900" y1="220" x2="900" y2="190" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
